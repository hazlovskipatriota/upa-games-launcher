name: Build UPA Games Launcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: UPA-Games-Launcher-Windows
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.blockmap

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 squashfs-tools

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run dist:linux -- --publish never

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: UPA-Games-Launcher-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run dist:mac -- --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: UPA-Games-Launcher-macOS
          path: |
            dist/*.dmg
            dist/*.zip
